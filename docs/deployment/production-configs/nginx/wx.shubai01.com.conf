server {
    server_name wx.shubai01.com;

    # 后端 API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # 健康检查端点
    location /health {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 腾讯会议桌面端中转页
    location = /meeting-launch {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 登录页面重定向到管理后台登录
    location = /login {
        return 301 /admin;
    }

    # 管理后台静态文件
    location /admin {
        alias /var/www/morning-reading/admin/dist;
        try_files $uri $uri/ /admin/index.html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 默认首页重定向到管理后台
    location = / {
        return 301 /admin;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/wx.shubai01.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/wx.shubai01.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    listen 80;
    server_name wx.shubai01.com;
    return 301 https://$host$request_uri;
}
